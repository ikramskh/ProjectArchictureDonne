global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'infrastructure'
    static_configs:
      - targets: ['prometheus:9090', 'grafana:3000']

  - job_name: 'spark-master'
    metrics_path: '/metrics/master/prometheus/'
    static_configs:
      - targets: ['spark-master:8080']

  - job_name: 'spark-worker'
    metrics_path: '/metrics/prometheus/'
    static_configs:
      - targets: ['spark-worker:8081']

  - job_name: 'airflow'
    static_configs:
      - targets: ['statsd-exporter:9102']

  - job_name: 'python-scrapers'
    static_configs:
      - targets: ['cnn-streamer:8001']

  - job_name: 'spark-job'
    static_configs:
      - targets: ['spark-streaming-job:8002']