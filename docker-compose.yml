services:

  # =========================
  # POSTGRES
  # =========================
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - bigdata-net

  # =========================
  # MINIO
  # =========================
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    networks:
      - bigdata-net
  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set myminio http://minio:9000 admin admin123;
      mc mb myminio/bronze;
      mc mb myminio/silver;
      exit 0;
      "
    networks:
      - bigdata-net

  # =========================
  # ZOOKEEPER
  # =========================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    volumes:
    - ./data/zookeeper:/var/lib/zookeeper/data
    - ./data/zookeeper/log:/var/lib/zookeeper/log
    networks:
      - bigdata-net

  # =========================
  # KAFKA
  # =========================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - ./data/kafka:/var/lib/kafka/data
    networks:
      - bigdata-net

  # =========================
  # SPARK MASTER
  # =========================
  spark-master:
    image: bitnamilegacy/spark:3.5.1
    container_name: spark-master
    restart: unless-stopped
    environment:
      - SPARK_MODE=master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./spark_jobs:/opt/spark_jobs
    networks:
      - bigdata-net
    command: >
      bash -c "
      echo '*.sink.prometheusServlet.class=org.apache.spark.metrics.sink.PrometheusServlet' > /opt/bitnami/spark/conf/metrics.properties &&
      echo '*.sink.prometheusServlet.path=/metrics/master/prometheus' >> /opt/bitnami/spark/conf/metrics.properties &&
      /opt/bitnami/spark/bin/spark-class org.apache.spark.deploy.master.Master
      "

  # =========================
  # SPARK WORKER
  # =========================
  spark-worker:
    image: bitnamilegacy/spark:3.5.1
    container_name: spark-worker
    restart: unless-stopped
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=3G
      - SPARK_WORKER_CORES=4
    ports:
      - "8081:8081"
    volumes:
      - ./spark_jobs:/opt/spark_jobs
    networks:
      - bigdata-net
    command: >
      bash -c "
      echo '*.sink.prometheusServlet.class=org.apache.spark.metrics.sink.PrometheusServlet' > /opt/bitnami/spark/conf/metrics.properties &&
      echo '*.sink.prometheusServlet.path=/metrics/prometheus' >> /opt/bitnami/spark/conf/metrics.properties &&
      /opt/bitnami/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
      "

  # =========================
  # AIRFLOW
  # =========================
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-init
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin123@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: >
      bash -c "
      airflow db init &&
      airflow users create --username admin --password admin123 --firstname Admin --lastname User --role Admin --email admin@example.com
      "
    networks:
      - bigdata-net

  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin123@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__METRICS__STATSD_ON: "true"
      AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
      AIRFLOW__METRICS__STATSD_PORT: 9125
    ports:
      - "8088:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data/airflow/logs:/opt/airflow/logs
      - ./data/airflow/plugins:/opt/airflow/plugins
      - ./spark_jobs:/opt/spark_jobs
      - ./scraper.py:/opt/airflow/scraper.py
      - ./aljazeera.py:/opt/airflow/aljazeera.py
      - ./data/raw:/opt/airflow/data/raw
    command: >
      bash -c "
      airflow scheduler &
      exec airflow webserver
      "
    networks:
      - bigdata-net

  statsd-exporter:
    image: prom/statsd-exporter
    container_name: statsd-exporter
    volumes:
      - ./init/statsd_mapping.yml:/etc/statsd-exporter/mapping.yml # Optionnel pour le nommage
    ports:
      - "9102:9102"
      - "9125:9125/udp"
    networks:
      - bigdata-net

  # =========================
  # CNN STREAMER (KAFKA)
  # =========================
  cnn-streamer:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: cnn-streamer
    restart: unless-stopped
    depends_on:
      - kafka
    volumes:
      - ./cnn.py:/opt/airflow/cnn.py
      - ./data/raw:/opt/airflow/data/raw
    command: ["python", "/opt/airflow/cnn.py"]
    networks:
      - bigdata-net

  # =========================
  # SPARK STREAMING JOB (CONSUMER)
  # =========================
  spark-streaming-job:
    image: bitnamilegacy/spark:3.5.1
    container_name: spark-streaming-job
    restart: always
    depends_on:
      - kafka
      - minio
      - spark-master
      - cnn-streamer
    ports:
      - "8002:8002"
    volumes:
      - ./spark_jobs:/opt/spark_jobs
    networks:
      - bigdata-net
    command: >
      bash -c "
      pip install prometheus_client &&
      spark-submit 
      --master spark://spark-master:7077 
      --executor-memory 1G 
      --executor-cores 1
      --total-executor-cores 2
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262 
      /opt/spark_jobs/spark_processor.py"

  # =========================
  # METABASE
  # =========================
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: admin
      MB_DB_PASS: admin123
      MB_DB_HOST: postgres
    depends_on:
      - postgres
    volumes:
      - ./data/metabase:/metabase-data
    networks:
      - bigdata-net

  # =========================
  # AUTO-CONFIG METABASE
  # =========================
  metabase-init:
    image: python:3.11-slim
    container_name: metabase-init
    depends_on:
      - metabase
      - postgres
    volumes:
      - ./init/init_metabase.py:/app/init_metabase.py
    networks:
      - bigdata-net
    command: bash -c "pip install requests && python /app/init_metabase.py"

  # =========================
  # PROMETHEUS (Monitoring)
  # =========================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - bigdata-net

  # =========================
  # GRAFANA (Visualisation)
  # =========================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000" 
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    depends_on:
      - prometheus
    volumes:
      - ./init/:/etc/grafana/provisioning
    networks:
      - bigdata-net

networks:
  bigdata-net:
    driver: bridge